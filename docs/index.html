<!DOCTYPE html>
<html lang="zh-cn">
<head>

<body>
    <div id="app" class="loader">
      <div class="loader1">Loading...</div>
    </div>
  <script>
    window.$docsify = {
      el:'#app',
      name: 'The Echo of End',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      auto2top: true,
      subMaxLevel: 100,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: 'auto',
      search: {
        maxAge: 86400000,
        paths: [],
        placeholder: '搜索',
        noData: '找不到结果',
        depth: 2,
        hideOtherSidebarContent: false,
        namespace: 'website-1',
        pathNamespaces: ['/zh-cn', '/ru-ru', '/ru-ru/v1'],
        pathNamespaces: /^(\/(zh-cn|ru-ru))?(\/(v1|v2))?/,
      },
      count: {
        countable: true,
        position: 'top',
        margin: '10px',
        float: 'right',
        fontsize: '0.9em',
        color: 'rgb(90,90,90)',
        language: 'chinese',
        isExpected: true,
      },
      tabs: {
        persist: true, // default
        sync: true, // default
        theme: 'classic', // default
        tabComments: true, // default
        tabHeadings: true, // default
        animation: 'fade',
      },
      copyCode: {
        buttonText: 'Copy', // 自定义复制按钮的文本
        errorText: 'Not Copy', // 自定义复制失败时的提示文本
        successText: 'Copy!' // 自定义复制成功时的提示文本
      },
      pagination: {
        previousText: '上一页',
        nextText: '下一页',
        crossChapter: true,
        crossChapterText: true
      },
      'flexible-alerts': {
        style: 'flat',
        note: {
          label: "信息"
        },
        tip: {
          label: "提示"
        },
        warning: {
          label: "注意"
        },
        attention: {
          label: "切记"
        }
      },
      loadFooter: true,
      loadFooter: '_footer.md',
      changelog: 'CHANGELOG.md',
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//fastly.jsdelivr.net/npm/docsify@4"></script>
  <script src="//fastly.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//fastly.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>

  <script src="//unpkg.com/docsify-count/dist/countable.js"></script>

  <script src="//fastly.jsdelivr.net/npm/@alertbox/docsify-footer/dist/docsify-footer.min.js"></script>
  <script>
    docsifyBackTop = {
        size: 32,           	// 数值，组件大小，默认值32。
        bottom: 15,         	// 数值，组件底部偏移距离，默认值15。
        right: 15,          	// 数值，组件右侧偏移距离，默认值15。
        logo: '🔝',				// logo:字符串或svg矢量图代码，默认为svg代码图标。
        bgColor: '\#2096ff'    	// 背景颜色，#fff、pink等，logo为svg图标时，不填。
    };
  </script>
  <script src="https://fastly.jsdelivr.net/gh/Sumsung524/docsify-backTop/dist/docsify-backTop.min.js"></script>
  <script>
    if (typeof navigator.serviceWorker !== 'undefined') {
      navigator.serviceWorker.register('sw.js')
    }
